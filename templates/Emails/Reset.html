{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset</title>
    <link rel="stylesheet" href="{% static 'StylesEmails/style_forget_form.css' %}">
</head>
<body>
    <section class="SectionForget">
        {% if messages %}
            {% for message in messages %}
                <div class="div_messages">
                    <p class="messages">{{message}}</p>
                </div>
            {% endfor %}
        {% endif %}
        <h1>Digite sua nova senha:</h1>
        <div class="forget_form">
            <form class="forget" method="POST">
                {% csrf_token %}
                <div class="EmailForget">
                    {% for labels in reset_password_form.visible_fields%}
                    <label for="{{labels.id_for_label}}">{{labels.label}}</label>
                    {{labels}}
                    {% endfor %}
                </div>
                <button type="submit" class="ForgetButton">Enviar</button>
            </form>
        </div>
    </section>
</body>
</html>
