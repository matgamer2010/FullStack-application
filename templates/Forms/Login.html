{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Header HTML</title>
    <link rel="stylesheet" href="{% static "Forms/static/style_login_form.css"%}"></link>
</head>
<body>
  <section class="SectionLogin">
    <div id="Login"> 
      <form class="FormLogin">
        {% csrf_token %}
        {% for field in form.visible_forms %}
        <div class="DivLogin">
          <label for={{ fields.id_for_label }}>{{field.label}}</label>
          {{field}}
        </div>
        <buttom id="ButtonLogin" type="submit">Login</buttom>
        {% endfor %}
      </form>
    </div>
  </section>
</body>
</html>
