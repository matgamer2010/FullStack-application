{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Header HTML</title>
    <link rel="stylesheet" href="{% static 'style_login_form.css' %}">
</head>
<body>
  <section class="SectionLogin">
    <div id="Login"> 
      <form class="FormLogin" method="post">
        {% csrf_token %}
        <div class="undefined">
          {% for field in forms.visible_fields %}
            <div class="DivLogin">
              <label for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
            </div>
          {% endfor %}
        </div>
        <button id="ButtonLogin" type="submit">Logar</button>
      </form>
    </div>
  </section>
</body>
</html>
