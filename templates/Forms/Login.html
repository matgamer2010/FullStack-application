{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'StylesForms/style_login_form.css' %}"/>
</head>

<body>

  <section class="SectionLogin">
    
    {% if messages %}
    <div class="div_messages">
      {% for message in messages %}
        <p class="messages">{{ message }}</p>
      {% endfor %}
    </div>
    {% endif %}
    
    
    <div class="Login"> 

      <h2>Faça seu login na M&M vendedores</h2>
      <a class="AuthoralRights" href="www.freepik.com">Designed by Freepik</a>
      <img class="ImageForms" alt="image_login" src="{% static 'image_form_2.png'%}" />

      <form class="FormLogin" method="POST">
        {% csrf_token %}
        <div class="Undefined">
          {% for field in forms.visible_fields %}
            <div class="Fields_django">
              <label for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
            </div>
          {% endfor %}
          <a href="{% url 'password_reset'%}">Esqueceu sua senha?</a>
        </div>

      <button type="submit" class="ButtonLogin">Login</button>
    </form>

      <div class="OAuthAuthenticate">
        <img class="ImageGoogle" onclick="window.location.href='http://localhost:8000/accounts/google/login/?process=login'" src="{% static 'google-logo.png'%}" alt="Google IMG" />
        <a href="http://localhost:8000/accounts/google/login/?process-login" class="CreateAccountWithOAuth">Crie uma conta com o Google!</a>
      </div>
      
    </div>
  </section>
</body>
</html>
